        .history-empty {

        .toast {

            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: white;
            padding: 14px 24px;

            font-weight: 500;

            z-index: 1000;
            opacity: 0;
            transition: transform 0.3s, opacity 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {

        .toast svg {

            height: 20px;

        footer {

        footer a {

        @media (max-width: 640px) {

            .copy-btn {
                width: 100%;
            }

            .history-time {

        }

</head>

    <script>
        const STORAGE_KEY = 'short_url_history';
        const MAX_HISTORY = 50;
        const BASE62 = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        const BASE_URL = 'https://d.me/';

        let currentShortUrl = '';

        function loadHistory() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch {
                return [];
            }
        }

        function saveHistory(history) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            } catch (e) {
                console.warn('Failed to save history:', e);
            }
        }

        function generateShortCode() {
            let code = '';
            const timestamp = Date.now().toString(36);
            const random = Math.random().toString(36).substring(2, 6);
            code = timestamp.slice(-4) + random;
            if (code.length < 6) {
                code += Math.random().toString(36).substring(2, 6 - code.length + 2);
            }
            return code.slice(0, 6);
        }

        function validateUrl(url) {
            if (!url || url.trim() === '') return false;
            let testUrl = url.trim();
            if (!testUrl.match(/^https?:\/\//i)) {
                testUrl = 'https://' + testUrl;
            }
            try {
                new URL(testUrl);
                return testUrl;
            } catch {
                return false;
            }
        }

        function generateShortUrl() {
            const input = document.getElementById('url-input');
            const resultSection = document.getElementById('result-section');
            const resultInput = document.getElementById('result-input');
            const generateBtn = document.getElementById('generate-btn');

            const validatedUrl = validateUrl(input.value);

            if (!validatedUrl) {
                showToast('请输入有效的网址', 'error');
                input.focus();
                return;
            }

            generateBtn.disabled = true;
            generateBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4V2A10 10 0 002 12h2a8 8 0 018-8z"/></svg> 生成中...';

            setTimeout(() => {
                const shortCode = generateShortCode();
                const shortUrl = BASE_URL + shortCode;

                currentShortUrl = shortUrl;
                resultInput.value = shortUrl;
                resultSection.classList.add('show');

                const history = loadHistory();
                history.unshift({
                    id: Date.now(),
                    original: validatedUrl,
                    short: shortUrl,
                    code: shortCode,
                    created: new Date().toLocaleString('zh-CN')
                });

                if (history.length > MAX_HISTORY) {
                    history.pop();
                }

                saveHistory(history);
                renderHistory();

                generateBtn.disabled = false;
                generateBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M13.768 12.072l-3.541-3.541a5.059 5.059 0 117.082-7.162l-4.22 4.22a1.875 1.875 0 11-2.652-2.652l4.22-4.22a5.06 5.06 0 010 7.162l-3.536 3.536a5.063 5.063 0 01-7.163 0 5.063 5.063 0 010-7.163l3.54-3.541a.938.938 0 011.326 0l3.54 3.541a2.19 2.19 0 010 3.094z"/></svg> 生成';

                showToast('短链接已生成', 'success');
                input.value = '';
            }, 300);
        }

        function copyToClipboard() {
            if (!currentShortUrl) return;

            const copyBtn = document.getElementById('copy-btn');

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(currentShortUrl).then(() => {
                    showCopySuccess();
                }).catch(() => {
                    fallbackCopy(currentShortUrl);
                });
            } else {
                fallbackCopy(currentShortUrl);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showCopySuccess();
            } catch {
                showToast('复制失败，请手动选择复制', 'error');
            }
            document.body.removeChild(textarea);
        }

        function showCopySuccess() {
            const copyBtn = document.getElementById('copy-btn');
            copyBtn.classList.add('copied');
            copyBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg> 已复制';
            showToast('复制成功', 'success');

            setTimeout(() => {
                copyBtn.classList.remove('copied');
                copyBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7.5 6.75V0h9v6.75h-9zm9 3H7.5C5.015 9.75 3 11.765 3 14.25S5.015 18.75 7.5 18.75h9C18.985 18.75 21 16.735 21 14.25S18.985 9.75 16.5 9.75zm-9 4.5c-1.035 0-1.875-.84-1.875-1.875s.84-1.875 1.875-1.875 1.875.84 1.875 1.875-.84 1.875-1.875 1.875zm9 0c-1.035 0-1.875-.84-1.875-1.875s.84-1.875 1.875-1.875 1.875.84 1.875 1.875-.84 1.875-1.875 1.875z"/></svg> 复制';
            }, 2000);
        }

        function renderHistory() {
            const history = loadHistory();
            const list = document.getElementById('history-list');
            const empty = document.getElementById('history-empty');
            const countEl = document.getElementById('history-count');
            const clearBtn = document.getElementById('clear-all-btn');

            countEl.textContent = history.length;
            clearBtn.style.display = history.length > 0 ? 'block' : 'none';

            if (history.length === 0) {
                list.innerHTML = '<div class="history-empty" id="history-empty"><svg viewBox="0 0 24 24"><path d="M13.5 2c-5.288 0-9.649 3.914-10.377 9h-3.123l4 5.917 4-5.917h-2.847c.711-3.972 4.174-7 8.347-7 4.687 0 8.5 3.813 8.5 8.5s-3.813 8.5-8.5 8.5c-3.015 0-5.662-1.583-7.171-3.957l-1.2 1.775c1.916 2.536 4.948 4.182 8.371 4.182 5.797 0 10.5-4.702 10.5-10.5S19.297 2 13.5 2z"/></svg><p>暂无生成记录</p></div>';
                return;
            }

            list.innerHTML = history.map(item => `
                <div class="history-item" data-id="${item.id}">
                    <div class="history-info">
                        <div class="history-short" onclick="recopyShortUrl('${item.short}')">${item.short}</div>
                        <div class="history-original" title="${escapeHtml(item.original)}">${escapeHtml(item.original)}</div>
                    </div>
                    <div class="history-time">${item.created}</div>
                    <button class="history-delete" onclick="deleteHistoryItem(${item.id})" title="删除">
                        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function recopyShortUrl(url) {
            currentShortUrl = url;
            copyToClipboard();
        }

        function deleteHistoryItem(id) {
            event.stopPropagation();
            let history = loadHistory();
            history = history.filter(item => item.id !== id);
            saveHistory(history);
            renderHistory();
            showToast('已删除', 'success');
        }

        function clearAllHistory(event) {
            event.stopPropagation();
            if (confirm('确定要清空所有历史记录吗？')) {
                saveHistory([]);
                renderHistory();
                showToast('已清空', 'success');
            }
        }

        function toggleHistory() {
            const header = document.getElementById('history-header');
            header.classList.toggle('collapsed');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            const toastIcon = document.getElementById('toast-icon');

            toastMessage.textContent = message;
            toast.className = 'toast ' + type;

            if (type === 'success') {
                toastIcon.innerHTML = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>';
            } else if (type === 'error') {
                toastIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>';
            }

            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        document.getElementById('url-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateShortUrl();
            }
        });

        document.getElementById('result-input').addEventListener('click', function() {
            this.select();
        });

        document.addEventListener('DOMContentLoaded', function() {
            renderHistory();
        });
    </script>
</body>
</html>
